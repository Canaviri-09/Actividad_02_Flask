<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa de Servicios en Educacion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Ruta a la imagen usando la carpeta static */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("{{ url_for('static', filename='img/fondo.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white; /* Para que el texto sea legible sobre fondo oscuro */
        }
        .card {
            color: black; /* Las tarjetas mantienen texto oscuro */
            background-color: rgba(255, 255, 255, 0.9);
        }
        .jumbotron-custom {
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 15px;
        }
                /* Estilo para el texto dentro de los campos del formulario */
        .form-control {
            color: #000000 !important; /* Fuerza el color negro */
            font-weight: bold;        /* Aplica negrita */
        }

        /* Estilo para cuando el usuario hace clic (foco) en el campo */
        .form-control:focus {
            color: #000000;
            font-weight: bold;
            background-color: #f8f9fa; /* Un gris muy claro para resaltar el campo activo */
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">Servicios Pro</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('index') }}">Inicio</a>
                <a class="nav-link" href="{{ url_for('contacto') }}">Contacto</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 ">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} bg-dark">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 bg-dark">
        <p>&copy; 2026 - Actividad 02 - TEM-742 - Emergentes II</p>
    </footer>
</body>
</html>
